# WiFi / WPA
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y

# Nordic driver behavior
CONFIG_NRF_WIFI_LOW_POWER=y
CONFIG_NRF_WIFI_RPU_RECOVERY=y
CONFIG_WIFI_READY_LIB=y




# =========================
# nRF70 Wi-Fi driver buffers
# =========================
# Number of RX buffers owned by the nRF70 driver itself.
# Too low → RX stalls/drops under load; too high → eats SRAM fast.
CONFIG_NRF70_RX_NUM_BUFS=12

# =========================
# net_pkt slab counts (packet headers / bookkeeping)
# =========================
# net_pkt objects are the "packet descriptors" (metadata + fragment chain pointers).
# If these max out you’ll see TX/RX slab pressure and allocation FAILs.
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=12

# =========================
# net_buf fragment pools (payload fragments)
# =========================
# Fragment buffers that carry actual packet data.
# Counts control how many fragments can be in flight; size controls fragmentation vs RAM.
# - Larger DATA_SIZE → fewer fragments / less CPU, but more RAM per buffer.
# - More COUNT → handles bursts / parallel TCP streams, but more RAM reserved.
CONFIG_NET_BUF_RX_COUNT=40
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NET_BUF_DATA_SIZE=512

# =========================
# Socket/context limits (how many sockets the system can juggle)
# =========================
# net_context objects back sockets; max_conn limits connections; poll/open/eventfd
# limits must be consistent or you’ll hit "weird" runtime ceilings.
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_MAX_CONN=16
CONFIG_ZVFS_POLL_MAX=16
CONFIG_ZVFS_OPEN_MAX=32
CONFIG_ZVFS_EVENTFD_MAX=32

# =========================
# Receive processing
# =========================
# reduces memory presure on receive queues
CONFIG_NET_CONTEXT_SYNC_RECV=y

# =========================
# TCP window sizing (throughput vs buffering pressure)
# =========================
# 0 means "use Zephyr defaults". Setting explicit smaller windows can reduce
# buffering pressure (and RAM churn) but may reduce throughput, especially on
# higher-latency links.
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=0
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=0

# =========================
# Global heaps
# =========================
# Use the _system_heap and not a dedicated heap form k_malloc and k_free
CONFIG_HEAP_MEM_POOL_SIZE=0
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=n

# =========================
# nRF Wi-Fi global heap
# =========================
# This heap is used by the Wi-Fi stack/driver for internal allocations.
# uncomment the following line to put the wifi on the system heap
# CONFIG_NRF_WIFI_GLOBAL_HEAP=y
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=16384
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=32768

# =========================
# MbedTLS global heap
# =========================
# Disable to use RamRaven heap
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536



